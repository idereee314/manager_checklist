<!DOCTYPE html>
<html lang="mn" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manager Dashboard</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Өгөгдөл ачаалж байна...</div>
</div>

<!-- App -->
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-dot">M</div>
      <span class="brand-name">Manager Board</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-stats" id="topbar-stats"></div>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Light/Dark">
        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button class="add-btn" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Ажил нэмэх
      </button>
    </div>
  </div>

  <div class="main">
    <!-- Calendar -->
    <div class="cal-panel" id="cal-panel">
      <div class="cal-bg-img" id="cal-bg-img"></div>
      <div class="cal-bg-overlay" id="cal-bg-overlay"></div>
      <div class="cal-inner">
        <div class="cal-nav">
          <button class="nav-btn" onclick="shiftMonth(-1)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span class="cal-month" id="cal-month-label"></span>
          <button class="nav-btn" onclick="shiftMonth(1)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="cal-weekdays">
          <span>Дав</span><span>Мяг</span><span>Лха</span>
          <span>Пүр</span><span>Баа</span><span>Бям</span><span>Ням</span>
        </div>
        <div class="cal-grid" id="cal-grid"></div>

        <!-- Settings row -->
        <!-- <div class="cal-settings">
          <button class="cal-setting-btn" onclick="document.getElementById('bg-upload').click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            Зураг оруулах
          </button>
          <button class="cal-setting-btn" onclick="removeBg()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Зураг хасах
          </button>
        </div>
        <input type="file" id="bg-upload" accept="image/*" style="display:none" onchange="handleBgUpload(event)"/> -->

        <!-- Bottom image section -->
        <div class="cal-bottom" id="cal-bottom">
          <div class="cal-bottom-empty" id="cal-bottom-empty" onclick="document.getElementById('bottom-upload').click()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            Зураг оруулах
          </div>
          <div class="cal-bottom-has" id="cal-bottom-has" style="display:none">
            <img class="cal-bottom-img" id="cal-bottom-img" src="" alt=""/>
            <div class="cal-bottom-toolbar">
              <div class="fit-btns">
                <button class="fit-btn active" id="fit-cover" onclick="setFit('cover')">Cover</button>
                <button class="fit-btn" id="fit-contain" onclick="setFit('contain')">Contain</button>
                <button class="fit-btn" id="fit-fill" onclick="setFit('fill')">Fill</button>
              </div>
              <button class="cal-bottom-del" onclick="removeBottomImg()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Хасах
              </button>
            </div>
          </div>
        </div>
        <input type="file" id="bottom-upload" accept="image/*" style="display:none" onchange="handleBottomUpload(event)"/>
      </div>
    </div>

    <!-- Day panel -->
    <div class="day-panel">
      <div class="day-header">
        <div class="day-header-left">
          <h2 id="day-title"></h2>
          <div class="day-sub" id="day-sub"></div>
        </div>
        <div class="day-prog-wrap">
          <div class="day-prog-outer">
            <div class="day-prog-inner" id="day-prog-fill" style="width:0%"></div>
          </div>
          <span class="day-prog-pct" id="day-prog-pct">0%</span>
        </div>
      </div>
      <div class="task-list-wrap" id="task-list"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h3>Шинэ ажил нэмэх</h3>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="field">
      <label>Ажлын нэр</label>
      <input type="text" id="f-name" placeholder="Ажлын нэр оруулна уу..."/>
    </div>
    <div class="field">
      <label>Огноо</label>
      <div class="date-quick">
        <button class="dq-btn" onclick="setQuickDate(0)">Өнөөдөр</button>
        <button class="dq-btn" onclick="setQuickDate(1)">Маргааш</button>
        <button class="dq-btn" onclick="setQuickDate(7)">7 хоног</button>
      </div>
      <input type="date" id="f-date"/>
    </div>
    <div class="field">
      <label>Цаг <span class="label-hint">— заавал биш</span></label>
      <div class="time-selects">
        <select id="f-hour">
          <option value="">Цаг</option>
        </select>
        <span class="time-colon">:</span>
        <select id="f-min">
          <option value="">Мин</option>
        </select>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Болих</button>
      <button class="btn-save" id="btn-save" onclick="saveTask()">Нэмэх</button>
    </div>
  </div>
</div>

<!-- Edit task modal -->
<div class="overlay" id="edit-overlay" onclick="editOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h3>Ажил засах</h3>
      <button class="modal-close" onclick="closeEditModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="field">
      <label>Ажлын нэр</label>
      <input type="text" id="ef-name" placeholder="Ажлын нэр..."/>
    </div>
    <div class="field">
      <label>Огноо</label>
      <input type="date" id="ef-date"/>
    </div>
    <div class="field">
      <label>Цаг <span class="label-hint">— заавал биш</span></label>
      <div class="time-selects">
        <select id="ef-hour"><option value="">Цаг</option></select>
        <span class="time-colon">:</span>
        <select id="ef-min"><option value="">Мин</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditModal()">Болих</button>
      <button class="btn-save" id="edit-save-btn" onclick="saveEditTask()">Хадгалах</button>
    </div>
  </div>
</div>

<!-- Mobile bottom nav -->
<div class="mob-nav" id="mob-nav">
  <button class="mob-tab active" id="tab-cal" onclick="switchTab('cal')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Календар</span>
  </button>
  <button class="mob-tab" id="tab-tasks" onclick="switchTab('tasks')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><polyline points="3 6 4 7 6 5"/><polyline points="3 12 4 13 6 11"/><polyline points="3 18 4 19 6 17"/></svg>
    <span>Ажлууд</span>
  </button>
  <button class="mob-tab" id="tab-add" onclick="openModal()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10" fill="var(--accent)" stroke="none"/><line x1="12" y1="7" x2="12" y2="17" stroke="white"/><line x1="7" y1="12" x2="17" y2="12" stroke="white"/></svg>
    <span>Нэмэх</span>
  </button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
